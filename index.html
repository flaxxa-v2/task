<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="cursor-trail" id="cursorTrail"></div>

    <div class="sidebar">
        <div class="logo">
            <h1>FLAXXA</h1>
            <span class="version">HUB V1</span>
        </div>
        
        <nav id="sidebarNav">
            <a href="#" class="nav-item active" data-category="all"><i class="fas fa-home"></i> Home</a>
            <a href="#" class="nav-item" data-category="games"><i class="fas fa-gamepad"></i> Games</a>
            <a href="#" class="nav-item" data-category="social"><i class="fas fa-users"></i> Social</a>
            <a href="#" class="nav-item" data-category="streaming"><i class="fas fa-film"></i> Streaming</a>
        </nav>

        <div class="account-section">
            <button id="accountBtn" class="account-btn">Sign In</button>
        </div>
    </div>

    <div class="main-content">
        <header>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search or enter URL..." autocomplete="off">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <button class="discord-btn">Discord</button>
        </header>

        <div class="hero">
            <h1>Welcome to FLAXXA HUB V1</h1>
            <p class="subtitle">Join Discord for more links!</p>
        </div>

        <div class="categories" id="topCategories">
            <div class="category-btn active" data-category="all">All</div>
            <div class="category-btn" data-category="games">Games</div>
            <div class="category-btn" data-category="social">Social</div>
            <div class="category-btn" data-category="streaming">Streaming</div>
        </div>

        <div class="apps-grid" id="appsGrid"></div>

        <!-- Feedback Section -->
        <div class="feedback-section">
            <h3>Send Feedback</h3>
            <textarea id="feedbackInput" placeholder="Report issues or suggest games..."></textarea>
            <button id="sendFeedback">Send Feedback</button>
        </div>
    </div>

    <!-- IFrame Modal -->
    <div class="iframe-modal" id="iframeModal">
        <div class="modal-header">
            <h3 id="modalTitle">Loading...</h3>
            <button class="close-modal" id="closeModal">✕</button>
        </div>
        <iframe id="appFrame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-downloads allow-presentation"></iframe>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
